name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-and-shell-checks:
    name: Python and Shell checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q .

      - name: Validate shell scripts syntax
        run: |
          bash -n start_bot.sh
          bash -n install_prod_docker.sh
          bash -n update_prod_docker.sh

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: python-and-shell-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ai-docs-bot:ci .
